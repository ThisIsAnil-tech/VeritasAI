name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *' # Daily scheduled runs

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Validate Datasets Format
      run: |
        python src/main.py validate --dataset src/data/datasets/golden_dataset.json
        python src/main.py validate --dataset src/data/datasets/edge_cases.json
        python src/main.py validate --dataset src/data/datasets/domain_specific.json

    - name: Run Unit Tests
      run: |
        pytest tests/ -v

    - name: Run LLM Evaluation Suites (Mock)
      run: |
        pytest src/tests/ -v

    - name: Upload Test Reports Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: quality-framework-reports
        path: reports/
        retention-days: 14
