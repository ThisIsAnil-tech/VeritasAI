[pytest]
testpaths = src/tests tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --html=reports/pytest_report.html --self-contained-html
markers =
    hallucination: Tests for hallucination detection
    context: Tests for context retention
    consistency: Tests for response consistency
    regression: Prompt regression tests
    slow: Slow running tests
